# ==============================================================================
# 语音仿读质量评估系统 — 统一配置文件
# ==============================================================================
# 此文件包含所有非敏感配置项。敏感信息（API 密钥）保留在 .env 中。
# 修改此文件后重新运行 python run.py 即可生效，无需重启。
# ==============================================================================

# ------------------------------------------------------------------------------
# LLM API 配置
# ------------------------------------------------------------------------------
llm:
  api_base: "https://api.deepseek.com/v1"
  model: "deepseek-v4-pro"
  thinking: true          # DeepSeek 思考模式 (true=启用)
  max_concurrency: 400    # LLM 线程池最大并发数
  timeout: 120            # API 请求超时秒数

# ------------------------------------------------------------------------------
# Whisper 模型配置
# ------------------------------------------------------------------------------
whisper:
  model_name: "small.en"       # 流水线使用的默认模型
  full_model_name: "medium.en" # 独立运行使用的完整模型

# ------------------------------------------------------------------------------
# 模块开关 (true=启用, false=跳过)
# ------------------------------------------------------------------------------
modules:
  voice_analysis: true
  whisper_transcribe: true
  llm_compare: true
  post_process: true
  filter_precheck: true
  error_visualize: true

# ------------------------------------------------------------------------------
# 词云参数
# ------------------------------------------------------------------------------
wordcloud:
  width: 800
  height: 600
  max_words: 200
  max_font_size: 100             # 单词最大字号（None=自动计算）
  min_font_size: 8               # 单词最小字号
  background_color: "white"
  prefer_horizontal: 1.0          # 1.0=全部横向排列，不允许纵向词
  color_all: "#455a64"             # 三合一词云主色调（深灰蓝）
  stopwords: "stopwords.txt"